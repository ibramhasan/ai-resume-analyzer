<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Career Toolkit</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <h1>ATS Resume Analyzer</h1>

    <form id="uploadForm">

        <input
            type="file"
            name="data"
            accept=".pdf"
            required>

        <br><br>

        <button id="analyzeBtn" type="submit">
            Analyze Resume
        </button>

    </form>

    <div id="loading" class="loading"></div>

    <div id="result"></div>

    <div id="optimizerSection"></div>

    <div id="optimizerResult"></div>

</div>

<script src="js/app.js"></script>

</body>

</html>
