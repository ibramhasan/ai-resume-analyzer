<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ATS Resume Analyzer</title>



</head>

<body>

<div class="container">

<h1>ATS Resume Analyzer</h1>

<form id="uploadForm">

<input
type="file"
name="data"
accept=".pdf"
required>

<br><br>

<button type="submit">

Analyze Resume

</button>

</form>

<div
id="loading"
class="loading">

</div>

<div
id="result">

</div>

</div>

<script>

const form=document.getElementById("uploadForm");

form.addEventListener("submit",async(e)=>{

e.preventDefault();

const loading=document.getElementById("loading");

const resultDiv=document.getElementById("result");

loading.innerHTML="⏳ Sedang menganalisis CV...";

resultDiv.innerHTML="";

const formData=new FormData(form);

try{

const response=await fetch("https://n8n.hasanibra.online/webhook/resume-analyzer",{

method:"POST",

body:formData

});

if(!response.ok){

throw new Error("Gagal mengambil hasil analisis.");

}

const result=await response.json();

loading.innerHTML="";

const breakdownHtml=result.breakdown.map(item=>`

<tr>

<td>${item.name}</td>

<td><b>${item.score}/${item.max}</b></td>

<td>${item.note}</td>

</tr>

`).join("");

resultDiv.innerHTML=`

<div class="card">

<h2>ATS Score</h2>

<div class="score">

${result.ats_score}

</div>

<div class="grade">

Grade : ${result.grade}

</div>

<div class="status">

${result.status}

</div>

<h2>Detail Penilaian</h2>

<table>

<thead>

<tr>

<th>Kategori</th>

<th>Skor</th>

<th>Catatan</th>

</tr>

</thead>

<tbody>

${breakdownHtml}

</tbody>

</table>

<h2>Summary</h2>

<p class="summary">

${result.summary}

</p>

<h2>Recommendation</h2>

${result.recommendation}

</div>

`;

}catch(err){

loading.innerHTML="";

resultDiv.innerHTML=`

<div class="card">

<p style="color:red;">

${err.message}

</p>

</div>

`;

}

});

</script>

</body>

</html>
