<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Career Toolkit</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="container">

        <h1>🚀 AI Career Toolkit</h1>

        <form id="uploadForm">

            <input
                type="file"
                name="data"
                accept=".pdf"
                required>

            <br><br>

            <button id="analyzeBtn" type="submit">

                Analyze Resume

            </button>

        </form>

        <!-- Loading -->

        <div id="loading" class="loading"></div>

        <!-- ATS Result -->

        <div id="result"></div>

        <!-- Resume Optimizer Button -->

        <div id="optimizerSection"></div>

        <!-- Resume Optimizer Result -->

        <div id="optimizerResult"></div>

    </div>

    <footer>

        <hr>

        <p>

            Powered by OpenAI • Workflow Automation by n8n

        </p>

        <p>

            Developed by Ibrahim Hasan

        </p>

    </footer>

    <script src="js/app.js"></script>

</body>

</html>
