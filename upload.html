<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>ATS Resume Analyzer</title>

<style>
body{
    font-family:Arial,Helvetica,sans-serif;
    max-width:800px;
    margin:40px auto;
    padding:20px;
}

button{
    padding:10px 20px;
    cursor:pointer;
}

#result{
    margin-top:30px;
    padding:20px;
    border:1px solid #ddd;
    border-radius:10px;
}

.loading{
    color:blue;
}
</style>

</head>

<body>

<h1>ATS Resume Analyzer</h1>

<form id="uploadForm">

<input
type="file"
id="cv"
accept=".pdf"
required>

<br><br>

<button type="submit">
Analyze Resume
</button>

</form>

<div id="result"></div>

<script>

document
.getElementById("uploadForm")
.addEventListener("submit", async function(e){

e.preventDefault();

const file=document.getElementById("cv").files[0];

const formData=new FormData();

formData.append("data",file);

document.getElementById("result").innerHTML=
"<p class='loading'>Analyzing Resume... Please wait...</p>";

try{

const response=await fetch(
"https://n8n.hasanibra.online/webhook/resume-analyzer",
{
method:"POST",
body:formData
});

const data=await response.json();

document.getElementById("result").innerHTML=`

<h2>ATS Score</h2>
<p>${data.ats_score}</p>

<h2>Summary</h2>
<p>${data.summary}</p>

<h2>Recommendation</h2>
<p>${data.recommendation}</p>

`;

}catch(err){

document.getElementById("result").innerHTML=
"<p style='color:red;'>Error : "+err+"</p>";

}

});

</script>

</body>
</html>
