<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ATS Resume Analyzer</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f7fb;
    margin:0;
    padding:40px;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    color:#1e3a8a;
}

button{

    padding:12px 20px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;

}

button:hover{

    background:#1d4ed8;

}

.card{

    background:white;
    margin-top:30px;
    padding:25px;
    border-radius:12px;
    box-shadow:0 3px 12px rgba(0,0,0,.1);

}

h2{

    color:#2563eb;

}

.loading{

    margin-top:20px;
    color:#555;

}

ol{

    padding-left:22px;

}

li{

    margin-bottom:18px;
    line-height:1.7;

}

b{

    color:#111827;

}

</style>

</head>

<body>

<div class="container">

<h1>ATS Resume Analyzer</h1>

<form id="uploadForm">

<input
type="file"
name="data"
accept=".pdf"
required>

<br><br>

<button type="submit">

Analyze Resume

</button>

</form>

<div
id="loading"
class="loading">

</div>

<div
id="result">

</div>

</div>

<script>

const form=document.getElementById("uploadForm");

form.addEventListener("submit",async(e)=>{

e.preventDefault();

const loading=document.getElementById("loading");

const resultDiv=document.getElementById("result");

loading.innerHTML="⏳ Analyzing resume... Please wait.";

resultDiv.innerHTML="";

const formData=new FormData(form);

try{

const response=await fetch("https://n8n.hasanibra.online/webhook/resume-analyzer",{

method:"POST",

body:formData

});

const result=await response.json();

loading.innerHTML="";

resultDiv.innerHTML=`

<div class="card">

<h2>ATS Score</h2>

<p style="font-size:28px;font-weight:bold;color:#2563eb;">
${result.ats_score}
</p>

<h2>Summary</h2>

<p>
${result.summary}
</p>

<h2>Recommendation</h2>

${result.recommendation}

</div>

`;

}catch(err){

loading.innerHTML="";

resultDiv.innerHTML=`

<div class="card">

<p style="color:red;">

${err}

</p>

</div>

`;

}

});

</script>

</body>
</html>
