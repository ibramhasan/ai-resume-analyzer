<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ATS Resume Analyzer</title>

<style>

body{

font-family:Arial,sans-serif;

background:#f5f7fb;

margin:0;

padding:40px;

}

.container{

max-width:900px;

margin:auto;

}

h1{

color:#2563eb;

}

button{

padding:12px 22px;

background:#2563eb;

color:white;

border:none;

border-radius:8px;

cursor:pointer;

font-size:16px;

}

button:hover{

background:#1d4ed8;

}

.card{

background:white;

padding:30px;

margin-top:30px;

border-radius:12px;

box-shadow:0 5px 15px rgba(0,0,0,.1);

}

.score{

font-size:42px;

font-weight:bold;

color:#2563eb;

margin-bottom:20px;

}

.loading{

margin-top:20px;

font-weight:bold;

color:#555;

}

table{

width:100%;

border-collapse:collapse;

margin-top:20px;

margin-bottom:30px;

}

th{

background:#2563eb;

color:white;

padding:12px;

text-align:left;

}

td{

padding:12px;

border-bottom:1px solid #ddd;

vertical-align:top;

}

tr:hover{

background:#f8fafc;

}

ol{

padding-left:22px;

}

li{

margin-bottom:20px;

line-height:1.8;

}

</style>

</head>

<body>

<div class="container">

<h1>ATS Resume Analyzer</h1>

<form id="uploadForm">

<input
type="file"
name="data"
accept=".pdf"
required>

<br><br>

<button type="submit">

Analyze Resume

</button>

</form>

<div
id="loading"
class="loading">

</div>

<div
id="result">

</div>

</div>

<script>

const form=document.getElementById("uploadForm");

form.addEventListener("submit",async(e)=>{

e.preventDefault();

const loading=document.getElementById("loading");

const resultDiv=document.getElementById("result");

loading.innerHTML="⏳ Sedang menganalisis CV...";

resultDiv.innerHTML="";

const formData=new FormData(form);

try{

const response=await fetch("https://n8n.hasanibra.online/webhook/resume-analyzer",{

method:"POST",

body:formData

});

const result=await response.json();

loading.innerHTML="";

const breakdownHtml=result.breakdown.map(item=>`

<tr>

<td>${item.name}</td>

<td><b>${item.score}/${item.max}</b></td>

<td>${item.note}</td>

</tr>

`).join("");

resultDiv.innerHTML=`

<div class="card">

<h2>ATS Score</h2>

<div class="score">

${result.ats_score}

</div>

<h2>Detail Penilaian</h2>

<table>

<thead>

<tr>

<th>Kategori</th>

<th>Skor</th>

<th>Catatan</th>

</tr>

</thead>

<tbody>

${breakdownHtml}

</tbody>

</table>

<h2>Summary</h2>

<p>

${result.summary}

</p>

<h2>Recommendation</h2>

${result.recommendation}

</div>

`;

}catch(err){

loading.innerHTML="";

resultDiv.innerHTML=`

<div class="card">

<p style="color:red;">

${err}

</p>

</div>

`;

}

});

</script>

</body>

</html>
